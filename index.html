<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <title>Audio Visualizer</title>
    <script type="importmap">
    {
      "imports": {
        "three": "./modules/three.js/build/three.module.js"
      }
    }
    </script>
    <script src="SoundNameReader.js"></script>
    <script type="module" src="main.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css">
  </head>
  <body>
    <header>
      <div id="header-buttons">
        <div id="file-open"></div>
        <div id="file-save"></div>
      </div>
      <div class="h2">Revisualize 3D</div>
    </header>
    <main>
      <canvas id="three-canvas"></canvas>

      <div id="progress-bar-container">
        <div id="progress-bar">
          <div id="progress-fill"></div>
        </div>
        <div id="time-display">
          <span id="current-time">0:00</span> / <span id="duration">0:00</span>
        </div>
      </div>

      <div id="now-playing">
        <div id="track-name">No Track Loaded</div>
      </div>

      <div id="hide-controlls" class="hide-button image-button"></div>
      <div id="controlls">
        <div class="h1">Controls</div>
        <label>Audio Volume
          <input type="range" id="audio-volume" min="0.1" max="2" step="0.1" value="1">
        </label>
        <div id="editorSwitch">
          <div id="oe-btn" class="list-button selected">Object Editor</div>
          <div id="pp-editor" class="list-button">Post Processing</div>
        </div>
        <div id="layers">
          <div id="layer-header">
            <div class="h2">Layers</div>
            <div id="add-layer" class="image-button"></div>
          </div>
          <div id="layer-list"></div>
        </div>
        <div id="current-layer-controls">
          <div class="h2">Layer Controls</div>
          <div id="layerTopButtons"></div>
          <div id="object-list"></div>
          <div id="object-properties"></div>
        </div>
        <div id="pp-section" style="display:none">
          <div id="pp-layer-header">
            <div class="h2">Post FX</div>
            <div id="add-pp-layer" class="image-button"></div>
          </div>
          <div id="pp-layer-list"></div>
          <div id="pp-layer-properties"></div>
        </div>
      </div>

      <div id="hide-player" class="image-button hide-button"></div>
      <div id="player">
        <div class="h1">Saved Tracks</div>
        <div id="saved-tracks"></div>
        <label>Add Track <input type="file" id="audio-file"></label>
      </div>
    </main>
    <footer></footer>
  </body>
</html>
