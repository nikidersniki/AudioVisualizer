<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <title>Audio Visualizer</title>
    <script type="importmap">
    {
      "imports": {
        "three": "./modules/three.js/build/three.module.js"
      }
    }
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/golden-layout@2.6.0/dist/css/goldenlayout-base.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/golden-layout@2.6.0/dist/css/themes/goldenlayout-dark-theme.css">
    <script src="SoundNameReader.js"></script>
    <script type="module" src="main.js"></script>
    <script defer src="mobile-ui.js"></script>
    <script type="module" src="gl-ui.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css">
  </head>
  <body>
    <header>
      <div id="header-buttons">
        <input type="file" id="file-input" accept=".json" style="display:none">
        <input type="file" id="resource-input" accept="image/*,video/*,audio/*" multiple style="display:none">
        <div id="file-new" class="Btn">New Project</div>
        <div id="file-open" class="Btn">Open File</div>
        <div id="file-save" class="Btn">Save File</div>
        <div id="add-resources" class="Btn">Add Resources</div>
        <div id="windows-menu" class="Btn-dropdown">
          <div id="windows-menu-btn" class="Btn">Windows ▾</div>
          <div id="windows-menu-list"></div>
        </div>
      </div>
      <div class="h2">Revisualize 3D</div>
    </header>
    <div id="gl-container"></div>
    <main>
      <div id="drag-drop"></div>
      <canvas id="three-canvas"></canvas>

      <div id="progress-bar-container">
        <canvas id="freq-preview"></canvas>
        <div id="progress-bar">
          <div id="progress-fill"></div>
        </div>
        <div id="playback-row">
          <div id="pause-btn">▶</div>
          <div id="time-display">
            <span id="current-time">0:00</span> / <span id="duration">0:00</span>
          </div>
        </div>
      </div>

      <div id="now-playing">
        <div id="track-name">No Track Loaded</div>
      </div>

      <div id="project-settings">
        <div id="scene-settings">
          <div class="h2 prop-section-title prop-section-collapsible" id="scene-settings-header">
            <span>Scene Settings</span><span class="prop-section-arrow" style="transform:rotate(-90deg)">▾</span>
          </div>
          <div id="scene-settings-body" style="display:none">
            <div class="prop-row">
              <label class="prop-label">Background</label>
              <input type="color" id="scene-clear-color" value="#000000" class="prop-color">
            </div>
            <div class="prop-row">
              <label class="prop-label">HDRI</label>
              <select id="scene-hdri" class="prop-select"></select>
            </div>
          </div>
        </div>
        <div id="viewport-settings">
          <div class="h2 prop-section-title">Viewport</div>
          <div class="prop-row">
            <label class="prop-label">Fixed Aspect</label>
            <input type="checkbox" id="viewport-fixed-toggle">
          </div>
          <div class="prop-row">
            <label class="prop-label">Aspect Ratio</label>
            <select id="viewport-aspect-select" class="prop-select">
              <option value="16:9">16:9</option>
              <option value="9:16">9:16</option>
              <option value="4:3">4:3</option>
              <option value="3:4">3:4</option>
              <option value="21:9">21:9</option>
              <option value="1:1">1:1</option>
            </select>
          </div>
        </div>
      </div>

      <div id="controlls">
        <div class="h1">Controls</div>
        <label>Audio Volume
          <input type="range" id="audio-volume" min="0" max="3" step="0.05" value="1">
        </label>
        <div id="editorSwitch">
          <div id="editor-switch-pill"></div>
          <div id="oe-btn" class="switch-tab selected">Object Editor</div>
          <div id="pp-editor" class="switch-tab">Post Processing</div>
          <div id="anim-btn" class="switch-tab">Animation</div>
        </div>
        <div id="layers">
          <div id="layer-header">
            <div class="h2">Layers</div>
            <div id="add-layer" class="image-button"></div>
          </div>
          <div id="layer-list"></div>
        </div>
        <div id="current-layer-controls">
          <div class="h2">Layer Controls</div>
          <div id="layerTopButtons"></div>
          <div id="object-list"></div>
          <div id="object-properties"></div>
        </div>
        <div id="pp-section" style="display:none">
          <div id="pp-context-pills">
            <div id="pp-pill-global" class="pp-pill selected">Global</div>
            <div id="pp-pill-layer" class="pp-pill is-disabled">Layer: —</div>
          </div>
          <div class="h2" id="pp-context-title">Global</div>
          <div id="pp-top-buttons"></div>
          <div id="pp-layer-list"></div>
          <div id="pp-layer-properties"></div>
        </div>
        <div id="anim-section" style="display:none">
          <div class="h2">Animated Properties</div>
          <div id="anim-list"></div>
        </div>
      </div>

      <div id="player">
        <div class="h1">Saved Tracks</div>
        <div id="saved-tracks"></div>
        <div id="player-controls">
          <label class="Btn" for="audio-file">Add Track</label>
          <input type="file" id="audio-file" style="display:none">
        </div>
      </div>
    </main>
    <footer></footer>
  </body>
</html>
