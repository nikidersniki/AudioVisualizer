<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <title>Audio Visualizer</title>
    <script type="importmap">
    {
      "imports": {
        "three": "./modules/three.js/build/three.module.js"
      }
    }
    </script>
    <script src="SoundNameReader.js"></script>
    <script type="module" src="main.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css">
  </head>
  <body>
    <header>

    </header>
    <main>
      <canvas id="three-canvas"></canvas>
      <div id="progress-bar-container">
        <div id="progress-bar">
          <div id="progress-fill"></div>
        </div>
        <div id="time-display"></div>
          <span id="current-time">0:00</span> / <span id="duration">0:00</span>
      </div>
      <div id="now-playing">
          <div id="track-name">No Track Loaded
      </div>
      </div>
      <div id="hide-controlls" class="hide-button image-button"></div>
        <div id="controlls">
          <div class="h1">Controls</div>
          <div id="layers">
            <div id="layer-header"><div class="h2">Layers</div><div id="add-layer" class="image-button"></div></div>
            <div id="layer-list"></div>
          </div>
          <div id="current-layer-controls">
            <div class="h2">Layer Controls</div>
          </div>  
          <label>Audio Volume<input type="range" id="audio-volume" min="0.1" max="2" step="0.1" value="1"></label>
          <label>Object Scale<input type="range" id="object-scale" min="0.1" max="2" step="0.1" value="1"></label>
          <label>Noise Scale<input type="range" id="noise-scale" min="0.1" max="10" step="0.1" value="1"></label>
          <label>Noise Amount<input type="range" id="noise-amount" min="0" max="10" step="0.1" value="1"></label>
          <label>Background Type<select id="background-select">
            <option value="Texture">Texture</option>
            <option value="Tube">Tube</option>
            <option value="Color">Color</option>
          </select></label>
          <label>Rotate Background<input type="checkbox" id="bg-spin"></label>
          <label>Background Light<input type="range" id="bg-light" min="0" max="10" step="0.1" value="1"></label>
          <label>Background Gradient<input type="checkbox" id="bg-gradient" checked></label>
          <label>Background Color<input type="color" id="bg-color" value="#000000"></label>
          <label>Model<select id="model-select">
            <option value="duck">Duck</option>
            <option value="eco-sphere">Eco Sphere</option>
            <option value="monke">Monke</option>
          </select></label>
          <label>Rotate Model<input type="checkbox" id="model-spin"></label>
          <label>Model Rotation Speed<input type="range" id="model-rotation-speed" min="0.01" max="30" step="0.01" value="1"></label>
          <label>Model Material<select id="model-material">
            <option value="normal">Normal</option>
            <option value="wireframe">Wireframe</option>
            <option value="standard">Standard</option>
          </select></label>
        
          <!-- Only shown when Standard is selected -->
          <div id="standard-material-controls" style="display:none">
            <label>Model Color<input type="color" id="model-color" value="#888888"></label>
            <label>Roughness<input type="range" id="model-roughness" min="0" max="1" step="0.01" value="1"></label>
            <label>Metalness<input type="range" id="model-metalness" min="0" max="1" step="0.01" value="0"></label>
          </div>
          <label style="display: none;">Wire Color<input type="color" id="wire-color" value="#888888"></label>
          <label>Color Change<input type="checkbox" id="color-change"></label>
          <label>Change Material<input type="checkbox" id="change-material"></label>
          <label>Material Threshold<input type="range" id="change-material-threshold" min="0.001" max="0.1" step="0.001" value="0.01"></label>
          <label>Bloom Strength<input type="range" id="bloom-strength" min="0" max="3" step="0.1" value="0.1"></label>
          <label>Bloom Radius<input type="range" id="bloom-radius" min="  0" max="1" step="0.1" value="1.0"></label>
          <label>Bloom Threshold<input type="range" id="bloom-threshold" min="0" max="1" step="0.01" value="0.1"></label>
        </div>
        <div id="hide-player" class="image-button hide-button"></div>
        <div id="player">
          <div class="h1">Saved Tracks</div>
          <div id="saved-tracks"></div>
          <label>Add Track  <input type="file" id="audio-file"></label>
        </div>
    </main>
    <footer>
      
    </footer>
  </body>
</html>
